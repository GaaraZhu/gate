name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: macos-14   # Apple Silicon — native aarch64-apple-darwin
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Bump version in Cargo.toml
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          sed -i '' "s/^version = \".*\"/version = \"${VERSION}\"/" crates/gate/Cargo.toml
          cargo generate-lockfile
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add crates/gate/Cargo.toml Cargo.lock
          git diff --cached --quiet || git commit -m "chore: bump version to ${VERSION}"
          git push origin main

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --target aarch64-apple-darwin

      - name: Package
        run: |
          ARCHIVE="gate-${VERSION}-aarch64-apple-darwin.tar.gz"
          tar -czf "${ARCHIVE}" -C target/aarch64-apple-darwin/release gate
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Compute SHA256
        run: |
          SHA256=$(shasum -a 256 "${ARCHIVE}" | awk '{print $1}')
          echo "SHA256=${SHA256}" >> "$GITHUB_ENV"
          echo "### Homebrew SHA256" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          echo "${SHA256}  ${ARCHIVE}" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          printf '## SHA256 (for homebrew-gate formula)\n```\n%s  %s\n```\n' \
            "${SHA256}" "${ARCHIVE}" > release_notes.md
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes-file release_notes.md \
            "${ARCHIVE}"

      - name: Update Homebrew formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git clone https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/GaaraZhu/homebrew-gate.git
          cd homebrew-gate
          sed -i '' \
            "s|url \".*\"|url \"https://github.com/GaaraZhu/gate/releases/download/${GITHUB_REF_NAME}/gate-${VERSION}-aarch64-apple-darwin.tar.gz\"|" \
            Formula/gate.rb
          sed -i '' \
            "s|sha256 \".*\"|sha256 \"${SHA256}\"|" \
            Formula/gate.rb
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/gate.rb
          git commit -m "chore: update gate to ${GITHUB_REF_NAME}"
          git push
