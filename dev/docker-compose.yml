services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gatepay
      POSTGRES_USER: gate
      POSTGRES_PASSWORD: gate
    ports:
      - "5432:5432"
    volumes:
      - ./seed.sql:/docker-entrypoint-initdb.d/seed.sql
      - gatepay-data:/var/lib/postgresql/data

volumes:
  gatepay-data:
