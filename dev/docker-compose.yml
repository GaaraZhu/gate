services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gate_demo
      POSTGRES_USER: gate
      POSTGRES_PASSWORD: gate
    ports:
      - "5432:5432"
    volumes:
      - ./seed.sql:/docker-entrypoint-initdb.d/seed.sql
      - gate_demo_data:/var/lib/postgresql/data

volumes:
  gate_demo_data:
